version: '3.8'

services:
  mongo:
    container_name: mongodb
    image: mongo:4
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    container_name: redis
    image: redis
    ports:
      - '6379:6379'
    command: redis-server --requirepass sa

volumes:
  mongo-data: